<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Save the Earth - Global Warming Game</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #e3f2fd;
            text-align: center;
        }
        h1 { margin-top: 10px; font-size: 32px; color: #1a237e; }
        p  { font-size: 18px; color: #333; }

        .game-area {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .items { width: 40%; }

        .item {
            width: 120px;
            height: 120px;
            margin: 12px;
            cursor: grab;
            transition: transform 0.2s;
            border-radius: 12px;
            padding: 5px;
            background: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .item:hover { transform: scale(1.15); }

        #earth-zone {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            border: 4px dashed #2c3e50;
            background: radial-gradient(circle, #cce7ff, #87ceeb);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #earth {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 0 30px rgba(0,136,255,0.6);
        }

        #danger {
            width: 80px;
            position: absolute;
            top: 15px;
            right: 15px;
            display: none;
        }

        #message {
            position: absolute;
            bottom: -40px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
        }

        #score-box {
            margin: 60px auto 10px;
            font-size: 20px;
            font-weight: bold;
            color: #1a237e;
        }

        #win-msg {
            display: none;
            font-size: 26px;
            font-weight: bold;
            color: green;
            margin: 10px;
        }

        .back-btn {
            display: inline-block;
            margin: 20px 10px;
            padding: 10px 25px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .game-area { flex-direction: column; }
            .items { width: 100%; }
            #earth-zone { margin-top: 30px; }
        }
    </style>
</head>
<body>

    <h1>🌍 Save the Earth</h1>
    <p>Drag <strong style="color:green;">good</strong> items to the Earth to save it. Avoid <strong style="color:red;">harmful</strong> ones!</p>

    <div class="game-area">
        <div class="items">
            <!-- BAD ITEMS -->
            <img src="/static/game_images/factory.jpg"  class="item harmful" draggable="true" alt="Factory" title="❌ Harmful">
            <img src="/static/game_images/factory2.png" class="item harmful" draggable="true" alt="More Factory" title="❌ Harmful">
            <img src="/static/game_images/plastic.jpg"  class="item harmful" draggable="true" alt="Plastic" title="❌ Harmful">
            <img src="/static/game_images/car.jpg"      class="item harmful" draggable="true" alt="Car Smoke" title="❌ Harmful">
            <!-- GOOD ITEMS -->
            <img src="/static/game_images/tree.jpg"     class="item good" draggable="true" alt="Tree" title="✅ Good">
            <img src="/static/game_images/tree2.png"    class="item good" draggable="true" alt="More Trees" title="✅ Good">
            <img src="/static/game_images/plant.png"    class="item good" draggable="true" alt="Plant" title="✅ Good">
            <img src="/static/game_images/windmill.jpg" class="item good" draggable="true" alt="Windmill" title="✅ Good">
            <img src="/static/game_images/solar.png"    class="item good" draggable="true" alt="Solar Panel" title="✅ Good">
        </div>

        <div id="earth-zone">
            <img src="/static/game_images/earth.jpg" id="earth" alt="Earth">
            <img src="/static/game_images/danger.jpg" id="danger" alt="Danger">
            <p id="message"></p>
        </div>
    </div>

    <div id="score-box">⭐ Score: <span id="score">0</span> / 5</div>
    <div id="win-msg">🎉 Amazing! You saved the Earth! 🌍💚</div>

    <br>
    <a href="/games" class="back-btn">⬅ Back to Games</a>

    <script>
        const items = document.querySelectorAll('.item');
        const earthZone = document.getElementById('earth-zone');
        const danger = document.getElementById('danger');
        const message = document.getElementById('message');
        let score = 0;
        const totalGood = 5;

        items.forEach(item => {
            item.addEventListener('dragstart', () => item.classList.add('dragging'));
            item.addEventListener('dragend',   () => item.classList.remove('dragging'));
        });

        earthZone.addEventListener('dragover', e => e.preventDefault());

        earthZone.addEventListener('drop', () => {
            const dragged = document.querySelector('.dragging');
            if (!dragged) return;

            if (dragged.classList.contains('harmful')) {
                danger.style.display = 'block';
                message.textContent = '⚠️ This harms the Earth!';
                message.style.color = 'red';
            } else {
                dragged.remove();
                score++;
                danger.style.display = 'none';
                message.textContent = '🌱 Good job! Earth is getting better!';
                message.style.color = 'green';
                document.getElementById('score').textContent = score;
                if (score >= totalGood) {
                    message.textContent = '';
                    document.getElementById('win-msg').style.display = 'block';
                }
            }
        });
    </script>
</body>
</html>
