<!DOCTYPE html>
<html>
<head>
    <title>Parent Dashboard</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 20px auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #2196F3; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1>👪 Parent Dashboard</h1>
        <div>
            <a href="/" style="margin-right: 15px; font-size: 24px;" title="Home">🏠</a>
            <a href="/leaderboard" style="margin-right: 15px; font-size: 24px;" title="Leaderboard">🏆</a>
            <a href="/logout" style="font-size: 24px;" title="Logout">⏻</a>
        </div>
    </div>
    
    <h2>Welcome, {{ parent.username }}!</h2>
    
    <h3>Student Performance</h3>
    <table>
        <tr>
            <th>Student</th>
            <th>Level</th>
            <th>Points</th>
            <th>🔥 Streak</th>
        </tr>
        {% for student in students %}
        <tr>
            <td>{{ student.username }}</td>
            <td>{{ student.level }}</td>
            <td>{{ student.points }}</td>
            <td>{{ student.current_streak or 0 }} days</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
