<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 20px auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #ff9800; color: white; }
        .rank { font-weight: bold; font-size: 20px; }
        .gold { color: #FFD700; }
        .silver { color: #C0C0C0; }
        .bronze { color: #CD7F32; }
        a { text-decoration: none; color: #4CAF50; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏆 Leaderboard</h1>
        <a href="/" style="font-size: 24px; color: #4CAF50;" title="Back to Dashboard">←</a>
    </div>
    
    <table>
        <tr>
            <th>Rank</th>
            <th>Student Name</th>
            <th>Username</th>
            <th>Level</th>
            <th>Points</th>
            <th>🔥 Streak</th>
        </tr>
        {% for student in students %}
        <tr>
            <td class="rank {% if loop.index == 1 %}gold{% elif loop.index == 2 %}silver{% elif loop.index == 3 %}bronze{% endif %}">
                {{ loop.index }}
            </td>
            <td>{{ student.full_name or student.username }}</td>
            <td>{{ student.username }}</td>
            <td>{{ student.level }}</td>
            <td>{{ student.points }} 🏆</td>
            <td>{{ student.current_streak or 0 }} days</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
